<!DOCTYPE html>
<html>
<body>

<select id="role">
    <option>Admin</option>
    <option>Manager</option>
    <option>User</option>
</select>

<button onclick="login()">Login</button>

<h2 id="greeting"></h2>

<script>
function login() {

    const role = document.getElementById('role').value;

    if(role === 'Admin')
        document.getElementById('greeting').innerText =
            'Welcome Admin';

    else if(role === 'Manager')
        document.getElementById('greeting').innerText =
            'Welcome Manager';

    else
        document.getElementById('greeting').innerText =
            'Welcome User';
}
</script>

</body>
</html>
